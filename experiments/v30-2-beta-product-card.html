<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whoknow · 胡闹宇宙</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0612'/%3E%3Ctext x='50' y='72' font-family='Inter,sans-serif' font-size='70' font-weight='900' fill='%23ff7849' text-anchor='middle'%3Ek%3C/text%3E%3C/svg%3E">
  <meta name="description" content="谁知道这个宇宙里会发生什么？" />
  <meta name="theme-color" content="#0a0612" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Noto+Sans+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&family=Bungee&family=ZCOOL+QingKe+HuangYou&family=Liu+Jian+Mao+Cao&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #6eda78;
      --green-dim: rgba(110, 218, 120, 0.12);
      --orange: #ff7849;
      --bg: #0a0612;
      --bg-2: #120a1a;
      --line: #1f1828;
      --line-2: #2a2236;
      --fg: #ededef;
      --fg-dim: #a094b8;
      --fg-mute: #6b6480;
    }

    html, body { background: var(--bg); }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* 背景：左上极淡绿光晕 + 网格点阵 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 500px 400px at 20% 0%, rgba(139, 92, 246, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 85% 100%, rgba(110, 218, 120, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 30%, rgba(255, 120, 73, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
      padding: 4rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ===== Hero ===== */
    .hero {
      text-align: center;
      padding-top: 4rem;
      width: 100%;
    }

    /* 顶部小标：mono 字体 · 标签感 */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.72rem;
      color: var(--fg-mute);
      letter-spacing: 0.15em;
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 99px;
      background: transparent;
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      background: #444;
      border-radius: 50%;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* 主标：单行 whoknow · 不要再花 */
    .logo {
      font-family: 'Bungee', 'Inter', 'PingFang SC', sans-serif;
      font-size: 6rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-top: 2rem;
      transform: rotate(-5deg);
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0;
      text-shadow:
        /* 黑描边 */
        -3px -3px 0 #0a0612,
        3px -3px 0 #0a0612,
        -3px 3px 0 #0a0612,
        3px 3px 0 #0a0612,
        /* 底部黑色硬阴影（立体投影） */
        0 10px 0 rgba(0, 0, 0, 0.6),
        0 14px 20px rgba(0, 0, 0, 0.4),
        /* 立体高光：左上方斜射白光（制造高光面） */
        -2px -2px 4px rgba(255, 255, 255, 0.6),
        /* 外发光：4 层白光（从近到远衰减） */
        0 0 12px rgba(255, 255, 255, 0.45),
        0 0 24px rgba(255, 255, 255, 0.3),
        0 0 48px rgba(255, 255, 255, 0.15),
        0 0 80px rgba(255, 255, 255, 0.08);
    }

    .logo-who {
      color: #fde047;
    }

    .logo-k {
      color: var(--orange);
      position: relative;
      display: inline-block;
      animation: bounce-k 1.8s ease-in-out infinite;
      margin: 0 0.05em;
    }

    @keyframes bounce-k {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.1); }
    }

    .logo-k::before {
      content: '\01F525';
      position: absolute;
      top: -1.4em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.42em;
      filter: drop-shadow(0 0 10px rgba(255, 120, 73, 0.9));
      animation: flicker-flame 0.4s ease-in-out infinite alternate;
    }

    @keyframes flicker-flame {
      0% { opacity: 0.85; transform: translateX(-50%) scale(1) translateY(0); }
      100% { opacity: 1; transform: translateX(-50%) scale(1.15) translateY(-3px) rotate(-4deg); }
    }

    /* ===== KUSO 脚注：紧贴 K 下方，像注释 ===== */
    .logo-kuso {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      gap: 0.08em;
      margin-top: -0.05em;
      pointer-events: none;
      z-index: 3;
      white-space: nowrap;
    }

    .k-letter {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.14em;
      font-weight: 400;
      color: var(--c, #888);
      display: inline-block;
      opacity: 0.85;
      letter-spacing: 0.02em;
      animation-delay: var(--d, 0s);
      transform-origin: center bottom;
    }

    /* 字母 1：安静型 —— 微浮 + 呼吸灯 */
    .k-letter-1 {
      animation:
        kid-float 1.4s ease-in-out infinite,
        kid-breathe 2.6s ease-in-out infinite;
    }

    @keyframes kid-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes kid-breathe {
      0%, 100% {
        opacity: 0.4;
        filter: brightness(0.7);
        text-shadow: 0 0 0 transparent;
      }
      50% {
        opacity: 1;
        filter: brightness(1.4);
        text-shadow: 0 0 8px rgba(253, 224, 71, 0.8);
      }
    }

    /* 字母 2：兴奋型 —— 小跳（克制） */
    .k-letter-2 {
      animation: kid-jump 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    @keyframes kid-jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* 字母 3：旋转型 —— 微旋转 */
    .k-letter-3 {
      animation: kid-spin 2.2s linear infinite;
    }

    @keyframes kid-spin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* 字母 4：摇摆型 —— 微摆 */
    .k-letter-4 {
      animation: kid-sway 1.6s ease-in-out infinite;
    }

    @keyframes kid-sway {
      0%, 100% { transform: translateX(0) rotate(0); }
      25% { transform: translateX(-1.5px) rotate(-4deg); }
      75% { transform: translateX(1.5px) rotate(4deg); }
    }

    /* 给字母起始微错位 */
    .k-letter-1 { transform: translateY(-0.5px); }
    .k-letter-2 { transform: translateY(0.5px); }
    .k-letter-3 { transform: translateY(-1px); }
    .k-letter-4 { transform: translateY(1px); }

    .logo-now {
      color: #fde047;
    }



    /* 中文"胡闹"：作为 logo 的小尾巴，不抢主标 */
    .chinese-brand {
      font-family: 'ZCOOL QingKe HuangYou', 'Liu Jian Mao Cao', 'Noto Sans SC', cursive;
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--orange);
      letter-spacing: 0.2em;
      margin-right: -0.2em;
      margin-top: 1.5rem;
      transform: rotate(6deg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3em;
      position: relative;
      text-shadow:
        -2px -2px 0 #0a0612,
        2px -2px 0 #0a0612,
        -2px 2px 0 #0a0612,
        2px 2px 0 #0a0612;
    }

    /* 涂鸦下划线 = 滑梯 */
    .chinese-brand::before {
      content: '';
      position: absolute;
      bottom: -0.15em;
      left: -0.2em;
      right: -0.2em;
      height: 4px;
      background: linear-gradient(90deg, transparent, #fde047 5%, #fde047 95%, transparent);
      transform: rotate(1deg);
      border-radius: 2px;
    }

    /* ✨ 星星：在「闹」字滑去的终点 */
    .chinese-brand::after {
      content: '\2728';
      position: absolute;
      top: 1em;
      right: -1.2em;
      font-size: 0.5em;
      animation: twinkle 1.5s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(0.9) rotate(0); }
      50% { opacity: 1; transform: scale(1.2) rotate(20deg); }
    }

    .chinese-brand .char {
      display: inline-block;
      color: var(--orange);
    }

    /* 「胡」字：模仿 KUSO 里的 u —— 微微上下跳动 */
    .chinese-brand .char:first-child {
      animation: hu-jump 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      transform-origin: center bottom;
    }

    @keyframes hu-jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.08em); }
    }

    /* 「闹」字 = 滑滑梯：沿斜坡向 ✨ 滑去 */
    .chinese-brand .char.accent {
      color: #fde047;
      animation: slide-down 3.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      display: inline-block;
      transform-origin: center center;
    }

    @keyframes slide-down {
      0% {
        opacity: 0;
        transform: translate(-0.1em, -0.05em) rotate(0deg) scale(0.7);
      }
      15% {
        opacity: 1;
        transform: translate(0, -0.05em) rotate(-2deg) scale(0.85);
      }
      40% {
        opacity: 1;
        transform: translate(0.6em, 0.02em) rotate(3deg) scale(0.95);
      }
      70% {
        opacity: 1;
        transform: translate(1.4em, 0.12em) rotate(6deg) scale(1.0);
      }
      88% {
        opacity: 0.9;
        transform: translate(2.1em, 0.20em) rotate(9deg) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translate(2.6em, 0.26em) rotate(12deg) scale(1.1);
      }
    }

    /* 副标：和主标统一字体 + 加描边立体 */
    .tagline {
      margin-top: 2.5rem;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      font-size: 1.05rem;
      color: var(--fg);
      line-height: 1.8;
      letter-spacing: 0;
      font-weight: 600;
      text-shadow:
        -1px -1px 0 #0a0612,
        1px -1px 0 #0a0612,
        -1px 1px 0 #0a0612,
        1px 1px 0 #0a0612;
      transition: opacity 0.4s ease-out;
    }


    /* 入场 C：模糊淡入（用 keyframes 动画，避开 reflow 问题） */
    #tagline-top {
      display: inline-block;
    }

    /* 新内容入场动画 */
    #tagline-top.entering {
      animation: enter-blur 0.5s ease-out forwards;
    }

    @keyframes enter-blur {
      0% {
        opacity: 0;
        filter: blur(10px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    /* 退场 E：字母飞散 */
    .char-anim {
      display: inline-block;
    }

    #tagline-top.flying .char-anim {
      animation: char-fly 0.5s ease-in forwards;
    }

    @keyframes char-fly {
      0% { transform: translate(0, 0) rotate(0); opacity: 1; }
      100% { transform: translate(var(--dx, 30px), var(--dy, -50px)) rotate(var(--rot, 90deg)); opacity: 0; }
    }


    .tagline .accent {
      color: #fde047;
      font-weight: 800;
      font-style: italic;
    }
    .tagline .dim {
      color: var(--fg-dim);
      font-weight: 400;
    }
    .tagline .sep {
      color: var(--fg-mute);
      margin: 0 0.5rem;
      font-weight: 400;
    }
    .tagline .question {
      display: inline-block;
      color: #fde047;
      font-size: 1.4em;
      font-weight: 900;
      vertical-align: middle;
      margin-right: 0.15em;
      transform: rotate(-8deg);
      text-shadow:
        -1px -1px 0 #0a0612,
        1px -1px 0 #0a0612,
        -1px 1px 0 #0a0612,
        1px 1px 0 #0a0612,
        0 2px 0 rgba(0, 0, 0, 0.4);
    }

    /* ===== Section ===== */
    .section {
      margin-top: 6rem;
      width: 100%;
    }

    .section-title {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-mute);
      letter-spacing: 0.2em;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .section-title .accent { color: var(--fg-mute); }

    /* β: 撕纸便签 */
    .products {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      padding: 0.5rem 0;
    }

    .sticky-note {
      background: #fde047;
      color: #1a0e2e;
      padding: 1.5rem 1.3rem 1.2rem;
      position: relative;
      transform: rotate(-1deg);
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: 'Ma Shan Zheng', 'ZCOOL QingKe HuangYou', cursive;
      box-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.3),
        4px 6px 12px rgba(0, 0, 0, 0.25);
    }

    .sticky-note:nth-child(2) {
      background: #6eda78;
      transform: rotate(1.5deg);
    }

    .sticky-note:nth-child(3) {
      background: #ff7849;
      color: #fff;
      transform: rotate(-2deg);
    }

    .sticky-note:hover {
      transform: rotate(0) scale(1.05);
      box-shadow:
        4px 4px 0 rgba(0, 0, 0, 0.3),
        8px 12px 24px rgba(0, 0, 0, 0.35);
      z-index: 5;
    }

    .sticky-note::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 60px;
      height: 18px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .note-icon {
      font-size: 2rem;
      margin-bottom: 0.3rem;
      font-family: 'Apple Color Emoji', sans-serif;
    }

    .note-title {
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    .note-desc {
      font-size: 0.95rem;
      opacity: 0.85;
      line-height: 1.4;
    }

    .note-footer {
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px dashed currentColor;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      opacity: 0.7;
      display: flex;
      justify-content: space-between;
    }

/* ===== Footer ===== */
    .footer {
      margin-top: auto;
      padding: 3rem 0 1.5rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.7rem;
      color: var(--fg-mute);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .footer .accent { color: var(--orange); }

    /* ===== Mobile ===== */
    @media (max-width: 480px) {
      .container { padding: 2.5rem 1.25rem 1.5rem; }
      .hero { padding-top: 2rem; }
      .logo { font-size: 3.8rem; }
      .chinese-brand { font-size: 1.8rem; }
      .product-row { padding: 0.9rem 1rem; }
    }
  
    /* X: hero 整体轻微晃动 */
    .hero {
      animation: hero-shake 2.5s ease-in-out infinite;
    }

    @keyframes hero-shake {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      25% { transform: translate(-0.5px, 0.3px) rotate(-0.15deg); }
      50% { transform: translate(0.4px, -0.2px) rotate(0.1deg); }
      75% { transform: translate(-0.3px, -0.4px) rotate(0.15deg); }
    }

    @keyframes logo-breathe {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(-5deg) scale(1.04); }
    }
    .logo {
      animation: logo-breathe 3s ease-in-out infinite;
    }
    /* ⚠️ transform 已被 keyframes 完全接管，rotate(-5deg) 在 keyframes 0%/100% 里保留 */
    /* W: 产品卡 hover 反骨 */
    .product-row:hover .name::after {
      content: '点啥点，这功能还在设计~';
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--orange);
      margin-top: 0.2rem;
      font-style: italic;
    }

    /* Y: 背景粒子 */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: particle-float var(--dur, 8s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes particle-float {
      0%, 100% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: var(--max-opacity, 0.6); }
      90% { opacity: var(--max-opacity, 0.6); }
      50% { transform: translate(var(--dx, 30px), var(--dy, -40px)); }
    }

  </style>
</head>
<body>
  <div class="container">

    <!-- ===== HERO ===== -->
    <div class="hero">

      <!-- 主标：纯文字，单一绿色锚点 K -->
      <div class="logo">
        <span class="logo-who">who</span><span class="logo-k">k</span><span class="logo-kuso">
          <span class="k-letter k-letter-1" style="--c:#fde047;--d:0s;">k</span>
          <span class="k-letter k-letter-2" style="--c:#ff7849;--d:0.2s;">u</span>
          <span class="k-letter k-letter-3" style="--c:#6eda78;--d:0.4s;">s</span>
          <span class="k-letter k-letter-4" style="--c:#a78bfa;--d:0.6s;">o</span>
        </span><span class="logo-now">now</span>
      </div>

      <!-- 胡闹：小一号，灰绿色，作为副标 -->
      <div class="chinese-brand">
        <span class="char">胡</span><span class="char accent">闹</span>
      </div>

      <!-- Tagline: 上行随机切换 + 下行固定 -->
      <div class="tagline" id="tagline">
        <span id="tagline-top"><!-- JS 注入：? + slogan 主体 --></span>
        <br>
        <span class="accent">— WHO KNOWS?</span> <span class="sep">·</span> 家人们<span class="dim">谁懂</span>
      </div>
      <script>
        (function() {
          var slogans = [
            '这个导购员居然阻止我买化妆品',
            '骑手送外卖时居然跟我聊哲学',
            '老板推荐菜时给我讲了个段子',
            'AI 居然用段子给我推新品',
            '下一秒会发生啥',
            '这个宇宙里啥都敢胡来'
          ];

          var currentSlogan = slogans[0];
          var topEl = document.getElementById('tagline-top');

          // 入场用 C：模糊淡入 → 不需要逐字动画，只要整体淡入
          function buildHTML(text) {
            return '<span class="question">?</span><span class="slogan-zh">' + text + '</span>';
          }

          function render() {
            var next;
            do {
              next = slogans[Math.floor(Math.random() * slogans.length)];
            } while (next === currentSlogan && slogans.length > 1);
            currentSlogan = next;

            // 退场 E：字母飞散
            // 先把当前内容拆成字符，每个字符加随机飞散方向
            var chars = topEl.querySelectorAll('.slogan-zh, .question');
            chars.forEach(function(el) {
              if (el.classList.contains('question')) {
                // ? 字符 - 直接飞散
                var dx = (Math.random() - 0.5) * 80;
                var dy = -40 - Math.random() * 50;
                var rot = (Math.random() - 0.5) * 240;
                el.style.setProperty('--dx', dx + 'px');
                el.style.setProperty('--dy', dy + 'px');
                el.style.setProperty('--rot', rot + 'deg');
                el.classList.add('char-anim');
              } else {
                // slogan 主体：每个字符拆出来
                var text = el.textContent;
                var spans = '';
                for (var i = 0; i < text.length; i++) {
                  var dx = (Math.random() - 0.5) * 80;
                  var dy = -40 - Math.random() * 50;
                  var rot = (Math.random() - 0.5) * 240;
                  spans += '<span class="char-anim" style="--dx: ' + dx + 'px; --dy: ' + dy + 'px; --rot: ' + rot + 'deg;">' + text[i] + '</span>';
                }
                el.outerHTML = spans;
              }
            });

            topEl.classList.add('flying');

            setTimeout(function() {
              // 退场动画完成
              topEl.classList.remove('flying');

              // 入场 C：模糊淡入（用 keyframes 动画）
              // 1. 替换内容（新 DOM 默认无 .entering）
              topEl.innerHTML = buildHTML(next);
              // 2. 强制 reflow，确保浏览器先渲染默认状态
              void topEl.offsetWidth;
              // 3. 加 .entering class → 触发 keyframes 动画
              topEl.classList.add('entering');
              // 4. 动画结束后移除 class（下次切换能再加）
              setTimeout(function() {
                topEl.classList.remove('entering');
              }, 500);
            }, 500);
          }

          currentSlogan = slogans[Math.floor(Math.random() * slogans.length)];
          topEl.innerHTML = buildHTML(currentSlogan);

          setInterval(render, 3000);
        })();
      </script>

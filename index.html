<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whoknow · 胡闹宇宙</title>
  <meta name="description" content="谁知道这个宇宙里会发生什么？" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: #08090a;
      color: #ededef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image:
        radial-gradient(ellipse 700px 500px at 50% 0%, rgba(110, 218, 120, 0.08) 0%, transparent 65%);
    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 3.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ---- Hero ---- */
    .hero {
      text-align: center;
      padding-top: 2.5rem;
    }

    /* ---- Logo block: 一体化设计 ---- */
    .logo {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 1.05;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    .logo-who {
      display: inline-block;
      transform: skewX(20deg);
    }

    .logo-k {
      display: inline-block;
      font-size: 1.35em;
      line-height: 1;
      padding: 0 0.35em;
      background: linear-gradient(180deg, #6eda78 0%, #fbbf24 55%, #ff6a6a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-now {
      display: inline-block;
      transform: skewX(-20deg);
      color: #6eda78;
    }

    .logo-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #6eda78;
      border-radius: 50%;
      top: 0.6em;
      right: 0.2em;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.6); }
    }

    /* ---- Chinese brand: 与 whoknow 同强度 ---- */
    .chinese-brand {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 3.2rem;
      font-weight: 900;
      color: #fff;
      margin-top: 0.4rem;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3em;
    }

    .chinese-brand .char {
      display: inline-block;
      transform: skewX(-20deg);
    }

    .chinese-brand .char1 { color: #6eda78; }

    /* ---- Tagline ---- */
    .tagline {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: #666;
      letter-spacing: 0.02em;
    }

    .tagline-sub {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
    }

    .tagline-sub .sep {
      color: #2a2a2a;
      margin: 0 0.4rem;
    }

    /* ---- Section header for products ---- */
    .section-title {
      margin-top: 6rem;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      align-self: stretch;
      text-align: center;
    }

    .section-title::before,
    .section-title::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: #1e1f21;
      vertical-align: middle;
      margin: 0 0.7rem;
    }

    /* ---- Products ---- */
    .products {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      margin-top: 1.5rem;
    }

    .product-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #121314;
      border: 1px solid #1e1f21;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
    }

    .product-row:hover {
      border-color: #6eda78;
      background: #17181a;
      transform: translateX(4px);
    }

    .product-row .icon {
      font-size: 1.8rem;
      width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .product-row .info { flex: 1; min-width: 0; }
    .product-row .name {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }
    .product-row .name .zh { font-family: 'Noto Sans SC', sans-serif; }
    .product-row .name .en { font-family: 'Inter', sans-serif; color: #555; font-weight: 400; }
    .product-row .name .sep { color: #333; margin: 0 0.3rem; }
    .product-row .desc { font-size: 0.8rem; color: #666; margin-top: 0.15rem; }
    .product-row .badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 99px; flex-shrink: 0; }
    .badge.dev { background: #1a2e1a; color: #6eda78; }
    .badge.design { background: #1e1a2e; color: #a78bfa; }
    .badge.idea { background: #2e1e1a; color: #fbbf24; }

    /* ---- Domain list: 3+3 居中 ---- */
    .domains {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 3rem;
      max-width: 420px;
    }

    .domains a {
      color: #444;
      text-decoration: none;
      font-size: 0.72rem;
      padding: 0.25rem 0.7rem;
      border: 1px solid #1e1f21;
      border-radius: 99px;
      transition: all 0.15s;
    }

    .domains a:hover { color: #6eda78; border-color: #6eda78; }

    /* ---- Footer ---- */
    .footer {
      margin-top: auto;
      padding: 2.5rem 0 1.5rem;
      font-size: 0.75rem;
      color: #444;
      text-align: center;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1.25rem; }
      .hero { padding-top: 2.5rem; }
      .logo { font-size: 3.2rem; }
      .chinese-brand { font-size: 2rem; letter-spacing: 0.4em; margin-right: -0.4em; }
      .product-row { padding: 1rem 1.25rem; }
      .section-title { margin-top: 3.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="logo">
        <span class="logo-who">who</span><span class="logo-k">k</span><span class="logo-now">now</span><span class="logo-dot"></span>
      </div>
      <div class="chinese-brand">
        <span class="char char1">胡</span><span class="char char2">闹</span>
      </div>
      <div class="tagline">谁知道这个宇宙里会发生什么？</div>
      <div class="tagline-sub">
        Who knows?<span class="sep">·</span>家人们谁懂啊
      </div>
    </div>

    <div class="section-title">胡闹三件套</div>

    <div class="products">
      <a class="product-row" href="#" onclick="alert('🍜 胡闹外卖开发中，即将上线！');return false;">
        <div class="icon">🍜</div>
        <div class="info">
          <div class="name"><span class="zh">胡闹外卖</span><span class="sep">·</span><span class="en">waimai</span></div>
          <div class="desc">段子手老板 × 戏精骑手 × 魔性评价</div>
        </div>
        <span class="badge dev">🎬 Day 6</span>
      </a>

      <a class="product-row" href="#" onclick="alert('🛒 胡闹导购还在设计阶段~');return false;">
        <div class="icon">🛒</div>
        <div class="info">
          <div class="name"><span class="zh">胡闹导购</span><span class="sep">·</span><span class="en">mart</span></div>
          <div class="desc">反骨导购阻止你 checkout</div>
        </div>
        <span class="badge design">💡 设计</span>
      </a>

      <a class="product-row" href="#" onclick="alert('🧠 胡闹大脑已设计好架构~');return false;">
        <div class="icon">🧠</div>
        <div class="info">
          <div class="name"><span class="zh">胡闹大脑</span><span class="sep">·</span><span class="en">brain</span></div>
          <div class="desc">控制中心 · AI 追热点推段子</div>
        </div>
        <span class="badge idea">🧪 规划</span>
      </a>
    </div>

    <div class="domains">
      <a href="https://whoknow.me" target="_blank">whoknow.me</a>
      <a href="https://whoknow.vip" target="_blank">whoknow.vip</a>
      <a href="https://whoknow.cc" target="_blank">whoknow.cc</a>
      <a href="https://whonow.me" target="_blank">whonow.me</a>
      <a href="https://whonow.vip" target="_blank">whonow.vip</a>
      <a href="https://whonow.cc" target="_blank">whonow.cc</a>
    </div>

    <div class="footer">
      whoknow — 谁都不知道接下来会发生什么
    </div>
  </div>
</body>
</html>

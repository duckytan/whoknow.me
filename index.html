    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
      background: #08090a;
      color: #ededef;

      display: flex;
      flex-direction: column;

    }

    .container {
      max-width: 640px;
      width: 100%;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ---- Hero ---- */
    .hero {
      text-align: center;
      padding-top: 5rem;
    }

    .chinese-brand {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      line-height: 1;
      background: linear-gradient(135deg, #6eda78, #ff6a6a, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: hue-shift 6s ease infinite;
    }

    @keyframes hue-shift {
      0%, 100% { filter: hue-rotate(0deg); }
      50% { filter: hue-rotate(30deg); }
    }

    .en-brand {
      margin-top: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;

    .tagline-box {

      padding: 0.75rem 1.5rem;
      border: 1px solid #1e1f21;
      border-radius: 99px;
      display: inline-block;
    }

    .tagline-text {
      font-size: 0.9rem;
      color: #888;
    }

    .tagline-sub {
      font-size: 0.75rem;
      color: #444;
      margin-top: 0.5rem;
    }

    /* ---- Products ---- */
    .products {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      margin-top: 4rem;
    }

    .product-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #121314;
      border: 1px solid #1e1f21;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .product-row:hover {
      border-color: #6eda78;
      background: #17181a;
      transform: translateX(4px);
    }

    .product-row .icon {
      font-size: 1.8rem;
      width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .product-row .info { flex: 1; min-width: 0; }
    .product-row .name { font-weight: 700; font-size: 1rem; color: #fff; }
    .product-row .en-name { font-size: 0.75rem; color: #555; font-family: 'Inter', sans-serif; margin-top: 0.1rem; }
    .product-row .desc { font-size: 0.8rem; color: #666; margin-top: 0.15rem; }
    .product-row .badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 99px; flex-shrink: 0; }
    .badge.dev { background: #1a2e1a; color: #6eda78; }
    .badge.design { background: #1e1a2e; color: #a78bfa; }
    .badge.idea { background: #2e1e1a; color: #fbbf24; }

    /* ---- Domain list ---- */
    .domains {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 3rem;
    }

    .domains a {
      color: #444;
      text-decoration: none;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid #1e1f21;
      border-radius: 99px;
      transition: all 0.15s;
    }

    .domains a:hover { color: #6eda78; border-color: #6eda78; }

    /* ---- Footer ---- */
    .footer {
      margin-top: auto;
      padding: 3rem 0 2rem;
      font-size: 0.75rem;
      color: #333;
      text-align: center;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1.25rem; }
      .hero { padding-top: 3rem; }
      .chinese-brand { font-size: 3.5rem; letter-spacing: 0.15em; }
      .product-row { padding: 1rem 1.25rem; }

  </style>
</head>
